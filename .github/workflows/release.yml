name: Release packages

on:
    release:
        types: [released]

env:
    RELEASE_VERSION: ${{ github.event.release.tag_name }}

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        name: Publish to Registry

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: '25.x'
                  registry-url: https://registry.npmjs.org

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Tag version
              run: |
                  bun pm version --cwd packages/prototype-extensions $RELEASE_VERSION --no-git-tag-version
                  bun pm version --cwd packages/utils $RELEASE_VERSION --no-git-tag-version
                  bun pm version --cwd packages/vue-utils $RELEASE_VERSION --no-git-tag-version
                  bun pm version --cwd packages/webkit-native-bridge $RELEASE_VERSION --no-git-tag-version
                  
                   sed -i 's/workspace:\*/${{ env.RELEASE_VERSION }}/g' packages/types/vue-utils.json

            - name: Build packages
              run: |
                  bun --cwd packages/prototype-extensions build
                  bun --cwd packages/utils build
                  bun --cwd packages/vue-utils build
                  bun --cwd packages/webkit-native-bridge build

            - name: Publish packages
              run: |
                  bun publish --cwd packages/prototype-extensions --access public
                  bun publish --cwd packages/utils --access public
                  bun publish --cwd packages/vue-utils --access public
                  bun publish --cwd packages/webkit-native-bridge --access public
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
